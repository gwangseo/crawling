version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: kbeauty_db
    environment:
      POSTGRES_DB: kbeauty_db
      POSTGRES_USER: kbeauty
      POSTGRES_PASSWORD: kbeauty_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kbeauty -d kbeauty_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kbeauty_backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./credentials:/app/credentials:ro
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kbeauty_dashboard
    env_file:
      - .env
    ports:
      - "8501:8501"
    depends_on:
      - backend
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0

volumes:
  postgres_data:
